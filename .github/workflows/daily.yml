name: daily pick

on:
  # 02:17 UTC = ~04:17 Europe/Berlin in summer, ~03:17 in winter.
  # Offbeat minute avoids the top-of-hour GH Actions backlog.
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Backfill: pick one album per missing day since the last entry"
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # commit picks.csv + cache back to main
  pages: write      # deploy to GitHub Pages
  id-token: write   # OIDC token for Pages deploy

concurrency:
  group: daily-pick
  cancel-in-progress: false

jobs:
  pick-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
      APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
      APPLE_MUSIC_USER_TOKEN: ${{ secrets.APPLE_MUSIC_USER_TOKEN }}
      APPLE_STOREFRONT: ${{ vars.APPLE_STOREFRONT }}
      APPLE_LANGUAGE: ${{ vars.APPLE_LANGUAGE }}
      TIMEZONE: ${{ vars.TIMEZONE }}
      ACCENT_ENABLED: ${{ vars.ACCENT_ENABLED }}
      INCLUDE_UPLOADS: ${{ vars.INCLUDE_UPLOADS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pick today's album
        env:
          BACKFILL: ${{ inputs.backfill }}
        run: |
          set +e
          if [ "$BACKFILL" = "true" ]; then
            python -m src.sample --backfill
          else
            python -m src.sample
          fi
          code=$?
          if [ "$code" -eq 78 ]; then
            echo "Nothing to pick (already done), continuing to rebuild."
            exit 0
          fi
          exit "$code"

      - name: Commit ledger and cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "no data changes to commit"
          else
            git commit -m "pick: $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      - name: Build site
        run: python -m src.build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - id: deployment
        name: Deploy to Pages
        uses: actions/deploy-pages@v4
