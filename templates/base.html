<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site.title }}{% endblock %}</title>
  {% if canonical_url %}<link rel="canonical" href="{{ canonical_url }}">{% endif %}
  {% block og %}{% endblock %}
  <script>try{if(localStorage.getItem('amcr.accent')==='off')document.documentElement.classList.add('no-accent')}catch(e){}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Roboto:wght@400;500&display=swap">
  <link rel="stylesheet" href="style.css">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="feed.xml">
  {% if tint %}<style>
    :root:not(.no-accent) {
      --bg: {{ tint.bg }};
      --fg: {{ tint.fg }};
      --line: {{ tint.fg }};
      --accent: {{ tint.fg }};
      --muted: color-mix(in srgb, {{ tint.fg }} 55%, {{ tint.bg }});
    }
  </style>{% endif %}
</head>
<body>
  {% block body %}{% endblock %}
  <script src="player.js" defer></script>
</body>
</html>
